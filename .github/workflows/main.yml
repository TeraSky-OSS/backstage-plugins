name: Node.js CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'cli/**'

jobs:
  build:
    env:
      NODE_OPTIONS: --max-old-space-size=4096

    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: '0'

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - run: yarn workspaces foreach -A install
      - run: yarn lint --since origin/main
      - run: yarn tsc
        continue-on-error: true
      - run: yarn workspaces foreach -W --include 'plugins/**' run build
      - run: yarn tsc
      - run: |
          # Retry 3 times before the steps actually fails
          (echo "===== Test Attempt: 1 ====" && yarn backstage-cli package test --coverage --all plugins/ -- --workerIdleMemoryLimit=512MB) || \
          (sleep 10 && echo "===== Test Attempt: 2 ====" && yarn backstage-cli package test --coverage --all plugins/ -- --workerIdleMemoryLimit=512MB) || \
          (sleep 10 && echo "===== Test Attempt: 3 ====" && yarn backstage-cli package test --coverage --all plugins/ -- --workerIdleMemoryLimit=512MB) || \
          (echo "==== Test Step Failed ====" && exit 1)
      - run: yarn dedupe
      - run: yarn build:all
